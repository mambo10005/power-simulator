services:

  postgres:

    image: timescale/timescaledb:latest-pg17

    container_name: power-postgres

    environment:

      POSTGRES_USER: power

      POSTGRES_PASSWORD: power

      POSTGRES_DB: powersim

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: power-redis

    ports:

      - "6379:6379"

volumes:

  postgres_data: